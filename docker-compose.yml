version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: linkcraft-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shortener
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: linkcraft-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  backend:
    build: ./backend
    container_name: linkcraft-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/shortener
      - USE_SQLITE=false
      - REDIS_URL=redis://redis:6379
      - USE_MEMORY_CACHE=false
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - postgres
      - redis
    restart: always

  frontend:
    build: ./frontend
    container_name: linkcraft-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  redis_data:
